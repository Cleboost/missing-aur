name: Force AUR Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package dir, e.g. "psst/psst-bin" or "temper/temper-git"'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm git

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pacman -S --noconfirm base-devel curl jq python-yaml openssh sudo pacman-contrib

      - name: Setup build user
        run: |
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build
          chown -R build:build "$GITHUB_WORKSPACE"
          sudo -u build bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          printf "Host aur.archlinux.org\n  IdentityFile ~/.ssh/id_aur\n  User aur\n" > ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Generate PKGBUILD and push to AUR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_aur -o StrictHostKeyChecking=accept-new"
          input="${{ inputs.package }}"
          [[ "$input" == packages/* ]] || input="packages/$input"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sudo -E -u build python3 manage.py generate "$input"

          for pkgbuild in "$input"/*/PKGBUILD; do
            [ -f "$pkgbuild" ] || continue
            pkg_dir=$(dirname "$pkgbuild")
            bash .github/scripts/push-to-aur.sh \
              "$pkg_dir" \
              "${{ secrets.AUR_USERNAME }}" \
              "${{ secrets.AUR_EMAIL }}" \
              "Manual update to $(grep -oP '^pkgver=\K.*' "$pkgbuild")-$(grep -oP '^pkgrel=\K.*' "$pkgbuild")"
          done
