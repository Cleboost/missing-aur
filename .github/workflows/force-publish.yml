name: Force AUR Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package dir, e.g. "psst/psst-bin" or "temper/temper-git"'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pacman -S --noconfirm base-devel curl jq python-yaml openssh sudo pacman-contrib

      - name: Setup build user
        run: |
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build
          chown -R build:build "$GITHUB_WORKSPACE"
          sudo -u build bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE"

      - name: Generate PKGBUILD
        run: |
          input="${{ inputs.package }}"
          [[ "$input" == packages/* ]] || input="packages/$input"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sudo -E -u build python3 manage.py generate "$input"
          echo "PKG_DIR=$input" >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          printf "Host aur.archlinux.org\n  IdentityFile ~/.ssh/id_aur\n  User aur\n" > ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push to AUR
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o StrictHostKeyChecking=accept-new
        run: |
          pkgname=$(grep -oP '^pkgname=\K.*' "${PKG_DIR}/PKGBUILD")

          git clone aur@aur.archlinux.org:${pkgname}.git aur_repo
          find aur_repo -maxdepth 1 ! -name ".git" ! -name "aur_repo" -exec rm -rf {} +
          cp "${PKG_DIR}/PKGBUILD" aur_repo/
          cp "${PKG_DIR}/.SRCINFO" aur_repo/

          # Copy local source files (non-URL entries in .SRCINFO)
          grep -E '^\s+source = ' "${PKG_DIR}/.SRCINFO" | grep -v '://' | sed 's/.*= //' | while read -r src; do
            [[ "$src" != *"::"* ]] && [ -f "${PKG_DIR}/$src" ] && cp "${PKG_DIR}/$src" aur_repo/
          done

          cd aur_repo
          git config user.name "${{ secrets.AUR_USERNAME }}"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add -A

          pkgver=$(grep -oP '^pkgver=\K.*' PKGBUILD)
          pkgrel=$(grep -oP '^pkgrel=\K.*' PKGBUILD)
          git commit -m "Manual update to ${pkgver}-${pkgrel}" || echo "Nothing to commit"
          git push origin master
