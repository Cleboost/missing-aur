name: AUR Git Sync

on:
  push:
    branches:
      - main
    paths:
      - 'packages/*/manifest.yaml'
  workflow_dispatch:

jobs:
  sync-packages:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pacman -S --noconfirm base-devel curl jq python-yaml openssh sudo pacman-contrib

      - name: Setup build user
        run: |
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build
          chown -R build:build "$GITHUB_WORKSPACE"
          sudo -u build bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          printf "Host aur.archlinux.org\n  IdentityFile ~/.ssh/id_aur\n  User aur\n" > ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Find modified manifests and publish
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o StrictHostKeyChecking=accept-new
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            manifests=$(find packages -name "manifest.yaml")
          else
            manifests=$(git diff-tree --no-commit-id --name-only -r HEAD \
              | grep -E '^packages/[^/]+/manifest\.yaml$' || true)
          fi

          if [ -z "$manifests" ]; then
            echo "No modified manifests found."
            exit 0
          fi

          for manifest in $manifests; do
            app_dir=$(dirname "$manifest")
            echo "::group::Processing $app_dir"
            sudo -E -u build python3 manage.py generate "$app_dir"

            for pkgbuild in "$app_dir"/*/PKGBUILD; do
              [ -f "$pkgbuild" ] || continue
              pkg_dir=$(dirname "$pkgbuild")
              pkgname=$(grep -oP '^pkgname=\K.*' "$pkgbuild")

              git clone aur@aur.archlinux.org:${pkgname}.git aur_repo
              find aur_repo -maxdepth 1 ! -name ".git" ! -name "aur_repo" -exec rm -rf {} +
              cp "$pkg_dir/PKGBUILD" aur_repo/
              cp "$pkg_dir/.SRCINFO" aur_repo/

              cd aur_repo
              git config user.name "${{ secrets.AUR_USERNAME }}"
              git config user.email "${{ secrets.AUR_EMAIL }}"
              git add PKGBUILD .SRCINFO

              if git diff --staged --quiet; then
                echo "No changes for ${pkgname}"
              else
                pkgver=$(grep -oP '^pkgver=\K.*' PKGBUILD)
                pkgrel=$(grep -oP '^pkgrel=\K.*' PKGBUILD)
                git commit -m "Update to ${pkgver}-${pkgrel}"
                git push origin master
                echo "Synced ${pkgname} to AUR"
              fi

              cd ..
              rm -rf aur_repo
            done
            echo "::endgroup::"
          done
