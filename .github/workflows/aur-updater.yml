name: AUR Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-packages:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      updated_packages: ${{ steps.check-updates.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git curl jq sudo pacman-contrib

      - name: Setup build user
        run: |
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build

      - name: Check for updates
        id: check-updates
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          updated_list=()
          for dir in */; do
            dir=${dir%/}
            if [[ -f "$dir/PKGBUILD" && -f "$dir/version.sh" ]]; then
              echo "::group::Checking $dir"
              pkgver=$(grep -oP '^pkgver=\K.*' "$dir/PKGBUILD")
              latest_ver=$(cd "$dir" && bash ./version.sh)
              
              if [[ "$pkgver" != "$latest_ver" ]]; then
                echo "New version detected for $dir: $pkgver -> $latest_ver"
                sed -i "s/^pkgver=.*/pkgver=$latest_ver/" "$dir/PKGBUILD"
                sed -i "s/^pkgrel=.*/pkgrel=1/" "$dir/PKGBUILD"
                
                chown -R build:build "$dir"
                
                sudo -u build bash -c "cd $dir && updpkgsums"
                sudo -u build bash -c "cd $dir && makepkg --printsrcinfo > .SRCINFO"
                
                real_pkgname=$(grep -oP '^pkgname=\K.*' "$dir/PKGBUILD")
                updated_list+=("{\"dir\": \"$dir\", \"pkgname\": \"$real_pkgname\"}")
              else
                echo "Already up to date ($pkgver)"
              fi
              echo "::endgroup::"
            fi
          done
          
          if [ ${#updated_list[@]} -eq 0 ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            printf -v joined '%s,' "${updated_list[@]}"
            echo "packages=[${joined%,}]" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push to GitHub
        if: steps.check-updates.outputs.packages != '[]'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update packages"
          git push

  publish-aur:
    needs: update-packages
    if: needs.update-packages.outputs.updated_packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.update-packages.outputs.updated_packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          echo "Host aur.archlinux.org
            IdentityFile ~/.ssh/id_aur
            User aur" > ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone and Push to AUR
        run: |
          git clone aur@aur.archlinux.org:${{ matrix.package.pkgname }}.git aur_repo
          
          find aur_repo -maxdepth 1 -not -name ".git" -not -name "aur_repo" -exec rm -rf {} +
          cp ${{ matrix.package.dir }}/PKGBUILD aur_repo/
          cp ${{ matrix.package.dir }}/.SRCINFO aur_repo/
          
          cd aur_repo
          git config user.name "${{ secrets.AUR_USERNAME }}"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          
          if git diff --staged --quiet; then
            echo "No changes for ${{ matrix.package.pkgname }}"
          else
            pkgver=$(grep -oP '^pkgver=\K.*' PKGBUILD)
            git commit -m "Update to $pkgver"
            git push origin master
          fi
