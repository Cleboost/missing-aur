name: AUR Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-packages:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      updated_packages: ${{ steps.check-updates.outputs.packages }}
    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pacman -S --noconfirm base-devel curl jq sudo pacman-contrib

      - name: Setup build user
        run: |
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build
          chown -R build:build "$GITHUB_WORKSPACE"
          sudo -u build bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE"

      - name: Check for updates
        id: check-updates
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sudo -E -u build ./manage.sh check-updates --ci

      - name: Commit and Push to GitHub
        if: steps.check-updates.outputs.packages != '[]'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update packages"
          git push

      - name: Upload generated package files
        if: steps.check-updates.outputs.packages != '[]'
        uses: actions/upload-artifact@v4
        with:
          name: generated-packages
          path: |
            packages/*/*/PKGBUILD
            packages/*/*/.SRCINFO

  publish-aur:
    needs: update-packages
    if: needs.update-packages.outputs.updated_packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.update-packages.outputs.updated_packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Download generated package files
        uses: actions/download-artifact@v4
        with:
          name: generated-packages

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          echo "Host aur.archlinux.org
            IdentityFile ~/.ssh/id_aur
            User aur" > ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone and Push to AUR
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o StrictHostKeyChecking=accept-new
        run: |
          git clone aur@aur.archlinux.org:${{ matrix.package.pkgname }}.git aur_repo
          
          find aur_repo -maxdepth 1 -not -name ".git" -not -name "aur_repo" -exec rm -rf {} +
          cp ${{ matrix.package.dir }}/PKGBUILD aur_repo/
          cp ${{ matrix.package.dir }}/.SRCINFO aur_repo/
          
          cd aur_repo
          git config user.name "${{ secrets.AUR_USERNAME }}"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          
          if git diff --staged --quiet; then
            echo "No changes for ${{ matrix.package.pkgname }}"
          else
            pkgver=$(grep -oP '^pkgver=\K.*' PKGBUILD)
            git commit -m "Update to $pkgver"
            git push origin master
          fi
