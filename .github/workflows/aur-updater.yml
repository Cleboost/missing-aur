name: AUR Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm git

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pacman -S --noconfirm base-devel curl jq python-yaml openssh sudo pacman-contrib

      - name: Setup build user
        run: |
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build
          chown -R build:build "$GITHUB_WORKSPACE"
          sudo -u build git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          printf "Host aur.archlinux.org\n  IdentityFile ~/.ssh/id_aur\n  User aur\n" > ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Check for updates and publish
        run: |
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_aur -o StrictHostKeyChecking=accept-new"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sudo -E -u build python3 manage.py check-updates --ci 2>&1 | tee /tmp/check_output.log
          packages=$(grep '^packages=' /tmp/check_output.log | sed 's/^packages=//' || echo '[]')

          if [ "$packages" = "[]" ] || [ -z "$packages" ]; then
            echo "No updates found."
            exit 0
          fi

          echo "Updated packages: $packages"

          echo "$packages" | python3 -c "
          import sys, json
          packages = json.load(sys.stdin)
          for p in packages:
              print(p['pkgname'] + '|' + p['dir'])
          " | while IFS='|' read -r pkgname pkg_dir; do
            bash .github/scripts/push-to-aur.sh \
              "$pkg_dir" \
              "${{ secrets.AUR_USERNAME }}" \
              "${{ secrets.AUR_EMAIL }}"
          done

      - name: Commit manifest changes to GitHub
        run: |
          packages=$(grep '^packages=' /tmp/check_output.log | sed 's/^packages=//' || echo '[]')
          if [ "$packages" = "[]" ] || [ -z "$packages" ]; then
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "$packages" | python3 -c "
          import sys, json
          packages = json.load(sys.stdin)
          for p in packages:
              print(p['pkgname'] + '|' + p['pkgver'] + '|' + p['dir'])
          " | while IFS='|' read -r pkgname pkgver pkg_dir; do
            app_dir=$(dirname "$pkg_dir")
            git add "${app_dir}/manifest.yaml"
            if ! git diff --staged --quiet; then
              old_ver=$(git diff --staged -- "${app_dir}/manifest.yaml" | grep '^-[[:space:]]*pkgver' | grep -oP ':\s*"?\K[^"[:space:]]+' || echo "?")
              git commit -m "chore(${pkgname}): bump ${old_ver} → ${pkgver}"
            fi
          done

          git push
