name: "🗑️ Request package removal"
description: "You are the upstream author or maintainer and want the AUR package removed entirely."
labels: ["removal-request"]
body:
  - type: markdown
    attributes:
      value: |
        We'll orphan or delete the AUR package and remove it from this repository. This will be handled promptly.

  - type: input
    id: package
    attributes:
      label: Package name
      placeholder: "e.g. psst-bin"
    validations:
      required: true

  - type: textarea
    id: proof
    attributes:
      label: Proof of ownership
      description: A link to your GitHub profile, upstream repo, or anything that confirms you are the author/maintainer.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason (optional)
